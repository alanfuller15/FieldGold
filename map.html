<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
<title>FieldGold — Stage 3</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#14110C;color:#F2EDE0;}
  #map{position:absolute;top:0;left:0;right:0;bottom:0;background:#14110C;}
  #panel{position:absolute;z-index:1000;top:10px;left:10px;background:rgba(30,26,19,.95);
    border:1px solid #4A3F2D;border-radius:10px;padding:11px 13px;max-width:300px;}
  #panel h1{font-size:.95rem;margin:0;color:#E8C04A;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  #panel h1 .chev{font-size:.8rem;color:#9C9684;transition:transform .2s;}
  #panelbody{margin-top:8px;}
  #panel.collapsed #panelbody{display:none;}
  #panel.collapsed h1 .chev{transform:rotate(-90deg);}
  #panel.collapsed{max-width:none;}
  @media(max-width:600px){ #panel{max-width:none;right:auto;} }
  .layer{display:flex;align-items:center;gap:8px;font-size:.82rem;color:#D8D0BE;margin:6px 0;cursor:pointer;}
  .layer input{width:15px;height:15px;margin:0;flex-shrink:0;}
  .swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
  .status{font-family:monospace;font-size:.67rem;color:#6E6857;margin-top:9px;max-height:64px;overflow:auto;}
  .ok{color:#6FA760;} .err{color:#C25A3A;}
  .info-pop{font-size:.8rem;line-height:1.45;max-width:240px;} .info-pop b{color:#14110C;}
  .info-pop .h{font-weight:700;color:#8a5a1a;display:block;margin-top:4px;}
</style>
</head>
<body>
<div id="panel">
  <h1 onclick="document.getElementById('panel').classList.toggle('collapsed')"><span>FieldGold · Mat-Su</span><span class="chev">▾</span></h1>
  <div id="panelbody">
  <label class="layer"><input type="checkbox" id="t-ardf" checked><span class="swatch" style="background:#C25A3A;"></span>Gold occurrences (ARDF)</label>
  <label class="layer"><input type="checkbox" id="t-geo" checked><span class="swatch" style="background:#5B8AA6;"></span>Stream geochem (Au/As)</label>
  <label class="layer"><input type="checkbox" id="t-claim" checked><span class="swatch" style="background:#C9A227;border:1px solid #E8C04A;"></span>Mining claims — DON'T dig here</label>
  <label class="layer"><input type="checkbox" id="t-terrain"><span class="swatch" style="background:#7a7a7a;"></span>Terrain hillshade (IfSAR 5m)</label>
  <label class="layer"><input type="checkbox" id="t-sites" checked><span class="swatch" style="background:#6FA760;border:1px solid #E8C04A;"></span>My logged sites (from Field Brain)</label>
  <label class="layer"><input type="checkbox" id="t-bench" checked><span class="swatch" style="background:#D29A3A;border:1px solid #E8C04A;"></span>Bench candidates (from Bench Hunter)</label>
  <div style="font-size:.62rem;color:#6E6857;margin:-2px 0 4px 23px;line-height:1.3;">Alaska = 5m IfSAR, coarser than Lower-48 LiDAR. Shows benches, pits, big workings — not fine trenches.</div>
  <div style="border-top:1px solid #4A3F2D;margin:9px 0 7px;"></div>
  <button id="findopen" style="width:100%;padding:9px;border:none;border-radius:7px;background:#6FA760;color:#14110C;font-weight:700;font-size:.82rem;cursor:pointer;font-family:inherit;">⛏ Find PROVEN + OPEN ground</button>
  <div style="font-size:.66rem;color:#9C9684;margin-top:5px;line-height:1.35;">Old-timer drainages with documented gold (ARDF) that show no active claim right now. <b style="color:#D29A3A;">Research only — always verify with BLM before acting.</b></div>
  <div class="status" id="status"></div>
  </div>
</div>
<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" onerror="window.__lf=1"></script>
<script src="fieldgold-data.js"></script>
<script>
const S=document.getElementById('status');
function log(m,c){const d=document.createElement('div');if(c)d.className=c;d.textContent=m;S.appendChild(d);S.scrollTop=S.scrollHeight;}
window.onerror=(m)=>{log('ERR: '+m,'err');return false;};

window.addEventListener('load',()=>{
  if(window.innerWidth<=600){ const p=document.getElementById('panel'); if(p) p.classList.add('collapsed'); }
  if(window.__lf||typeof L==='undefined'){log('Leaflet failed','err');return;}
  const map=L.map('map',{center:[61.78,-149.15],zoom:11,zoomControl:false});
  L.control.zoom({position:'topright'}).addTo(map);
  const streets=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'});
  const satellite=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'© Esri'});
  const topo=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17,attribution:'© OpenTopoMap'});
  streets.addTo(map);
  L.control.layers({'Streets':streets,'Satellite':satellite,'Topo':topo},null,{position:'topright'}).addTo(map);
  log('map ready ✓','ok');

  function wms(base,layers,attr){
    const lyr=L.tileLayer.wms(base+'?',{layers,format:'image/png',transparent:true,version:'1.3.0',attribution:attr});
    let done=false; lyr.on('load',()=>{if(!done){done=true;log(layers+' ✓','ok');}});
    return lyr;
  }
  const ardf=wms('https://mrdata.usgs.gov/services/ardf','ardf','USGS ARDF').addTo(map);
  const geo =wms('https://mrdata.usgs.gov/services/ngdbsed','ngdbsed','USGS NGDB').addTo(map);

  // CLAIMS — now as proper TILES via a custom Leaflet tile layer that hits the ArcGIS
  // export endpoint per-tile (256x256). This pans/zooms smoothly like WMS, loads incrementally,
  // and no more single-image stretching/green-grid drag artifact.
  const ClaimTiles = L.TileLayer.extend({
    getTileUrl: function(coords){
      const nw = this._map.unproject([coords.x*256, coords.y*256], coords.z);
      const se = this._map.unproject([(coords.x+1)*256, (coords.y+1)*256], coords.z);
      // ArcGIS export in Web Mercator (3857) matches Leaflet's tile grid exactly -> crisp, aligned tiles
      const b3857 = [L.CRS.EPSG3857.project(nw), L.CRS.EPSG3857.project(se)];
      const bbox = `${b3857[0].x},${b3857[1].y},${b3857[1].x},${b3857[0].y}`;
      return 'https://gis.blm.gov/akarcgis/rest/services/Minerals/BLM_AK_Federal_Mining_Claims/MapServer/export?'
        + new URLSearchParams({ bbox, bboxSR:'3857', imageSR:'3857', size:'256,256',
            format:'png32', transparent:'true', f:'image', layers:'show:0' });
    }
  });
  const claims = new ClaimTiles('', { opacity:0.6, attribution:'BLM AK Claims' });
  let claimDone=false; claims.on('load',()=>{if(!claimDone){claimDone=true;log('claims ✓','ok');}});
  claims.addTo(map);
  log('requesting 3 layers…');

  // TERRAIN: USGS 3DEP hillshade (Alaska = 5m IfSAR). WMS 1.3.0, verified endpoint.
  // Off by default (it's a heavy base-ish layer); toggle on to read the ground.
  const terrain=L.tileLayer.wms('https://elevation.nationalmap.gov/arcgis/services/3DEPElevation/ImageServer/WMSServer?',{
    layers:'3DEPElevation:Hillshade Multidirectional', format:'image/png', transparent:true,
    version:'1.3.0', opacity:0.55, attribution:'USGS 3DEP (IfSAR 5m, AK)'});
  let terrDone=false; terrain.on('load',()=>{if(!terrDone){terrDone=true;log('terrain ✓','ok');}});
  terrain.on('tileerror',()=>log('terrain tile error (edge/no-data)','err'));
  document.getElementById('t-terrain').addEventListener('change',e=>{
    if(e.target.checked){ terrain.addTo(map); terrain.bringToFront(); log('terrain requested…'); }
    else map.removeLayer(terrain);
  });

  // MY SITES: prospects logged in Field Brain, pushed here via same-origin
  // localStorage. Score-colored markers, tappable for the verdict. Read-only
  // view of your own data — the bridge is one-way (Field Brain writes, map reads).
  const siteMarkers=L.layerGroup();
  function scoreColor(pct){ return pct>=72?'#6FA760':pct>=50?'#D29A3A':'#C25A3A'; }
  function loadMySites(){
    siteMarkers.clearLayers();
    let sites=[];
    // Prefer the shared record; fall back to the legacy sites key
    if(window.FieldGoldData){
      sites=FieldGoldData.get('site');
    }
    if(!sites.length){
      let payload=null;
      try{ payload=JSON.parse(localStorage.getItem('fieldgold_sites')||'null'); }catch(_){}
      if(payload&&payload.sites) sites=payload.sites;
    }
    if(!sites.length){
      log('no logged sites yet (log some in Field Brain)','');
      return 0;
    }
    sites.forEach(s=>{
      const col=scoreColor(s.score);
      L.circleMarker([s.lat,s.lon],{radius:8,color:'#14110C',weight:2,fillColor:col,fillOpacity:.85})
        .addTo(siteMarkers)
        .bindPopup('<div class="info-pop"><span class="h" style="color:#3a7a2a;">⛏ Your logged site</span>'
          +'<b>'+(s.name||'Prospect')+'</b><br>'
          +'<span style="color:'+col+';font-weight:700;">'+s.score+'/100 · '+(s.verdict||'')+'</span>'
          +(s.heightAboveStream!=null?'<br>⛰ '+s.heightAboveStream+'m above stream'+(s.heightAboveStream>=3?' (possible old channel)':''):'')
          +'</div>');
    });
    log('my sites: '+sites.length+' plotted','ok');
    return sites.length;
  }
  siteMarkers.addTo(map);
  loadMySites();
  document.getElementById('t-sites').addEventListener('change',e=>{
    if(e.target.checked){ siteMarkers.addTo(map); loadMySites(); }
    else map.removeLayer(siteMarkers);
  });

  // BENCH CANDIDATES: flagged by the bench hunter, read from the shared record.
  // Amber diamond markers, distinct from the round site markers.
  const benchMarkers=L.layerGroup();
  function loadBenches(){
    benchMarkers.clearLayers();
    let benches=[];
    if(window.FieldGoldData) benches=FieldGoldData.get('bench');
    if(!benches.length){ log('no bench candidates yet (run the bench hunter)',''); return 0; }
    benches.forEach(b=>{
      const icon=L.divIcon({className:'bench-div',iconSize:[16,16],
        html:'<div style="width:12px;height:12px;background:#D29A3A;border:2px solid #14110C;transform:rotate(45deg);"></div>'});
      L.marker([b.lat,b.lon],{icon}).addTo(benchMarkers)
        .bindPopup('<div class="info-pop"><span class="h" style="color:#a8791f;">⛰ Bench candidate</span>'
          +'<b>Profile '+b.profile+'</b><br>'
          +b.count+' candidate'+(b.count>1?'s':'')+' · nearest '+b.nearest+' m above creek'
          +(b.strong?'<br><span style="color:#a8791f;font-weight:700;">has a strong one</span>':'')
          +'<br><span style="font-size:.72rem;color:#6E6857;">Walk the shelf and read the ground — see Bench Hunter.</span></div>');
    });
    log('bench candidates: '+benches.length+' plotted','ok');
    return benches.length;
  }
  benchMarkers.addTo(map);
  loadBenches();
  document.getElementById('t-bench').addEventListener('change',e=>{
    if(e.target.checked){ benchMarkers.addTo(map); loadBenches(); }
    else map.removeLayer(benchMarkers);
  });

  // GEOCHEM SAMPLE MARKERS: NGDB sediment sample points, tappable -> link to official assay page.
  // WFS gives location + lab_id + url; the Au/As values live on the linked USGS page.
  const geoMarkers=L.layerGroup();
  let geoLoaded=false;
  async function loadGeochemMarkers(){
    if(geoLoaded){ geoMarkers.addTo(map); return; }
    const b=map.getBounds();
    const url='https://mrdata.usgs.gov/wfs/ngdbsed?'+new URLSearchParams({
      service:'WFS',version:'1.1.0',request:'GetFeature',typeName:'ngdbsed',maxFeatures:'300',
      bbox:`${b.getWest()},${b.getSouth()},${b.getEast()},${b.getNorth()}`});
    try{
      const r=await fetch(url); const xml=await r.text();
      const recs=[...xml.matchAll(/<ms:ngdbsed[\s\S]*?<\/ms:ngdbsed>/g)];
      const g=(s,re)=>{const x=s.match(re);return x?x[1]:'';};
      let n=0;
      recs.forEach(m=>{
        const s=m[0];
        const pos=g(s,/<gml:pos>([^<]*)</); if(!pos) return;
        const [lat,lon]=pos.trim().split(/\s+/).map(parseFloat);
        const lab=g(s,/<ms:lab_id>([^<]*)</)||'sample';
        const purl=g(s,/<ms:url>([^<]*)</).replace(/&amp;/g,'&');
        L.circleMarker([lat,lon],{radius:5,color:'#5B8AA6',weight:1.5,fillColor:'#5B8AA6',fillOpacity:.6})
          .addTo(geoMarkers)
          .bindPopup('<div class="info-pop"><span class="h" style="color:#2a5a7a;">Stream sediment sample</span>'
            +'<b>'+lab+'</b><br>Real Au / As / pathfinder assay values on the USGS page:<br>'
            +'<a href="'+(purl||'#')+'" target="_blank" style="color:#5B8AA6;font-weight:700;">View full assay ↗</a></div>');
        n++;
      });
      geoLoaded=true; geoMarkers.addTo(map);
      log('geochem samples: '+n+' (tap a dot for assay link)','ok');
    }catch(e){ log('geochem markers failed: '+e.message,'err'); }
  }


  document.getElementById('t-ardf').addEventListener('change',e=>e.target.checked?ardf.addTo(map):map.removeLayer(ardf));
  document.getElementById('t-geo').addEventListener('change',e=>{
    if(e.target.checked){ geo.addTo(map); loadGeochemMarkers(); }
    else { map.removeLayer(geo); map.removeLayer(geoMarkers); }
  });
  // load geochem sample markers on start (layer is checked by default)
  loadGeochemMarkers();
  document.getElementById('t-claim').addEventListener('change',e=>e.target.checked?claims.addTo(map):map.removeLayer(claims));

  // helper: fetch with timeout so a slow server can't hang the popup
  function fetchT(url,opts={},ms=6000){
    return Promise.race([fetch(url,opts),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),ms))]);
  }

  // Save a tapped occurrence to the shared record; Field Brain reads it to seed an evaluation.
  window.saveOccurrence=function(lat,lon){
    if(!window.FieldGoldData){ alert('Shared data not available'); return; }
    FieldGoldData.put({ kind:'occurrence', lat:lat, lon:lon, source:'map',
      name:'ARDF occurrence', pending:true });
    map.closePopup();
    const done=L.popup({maxWidth:240}).setLatLng([lat,lon])
      .setContent('<div class="info-pop"><span class="h" style="color:#3a7a2a;">✓ Sent to Field Brain</span>Open Field Brain → it will offer to start an evaluation at this spot.</div>')
      .openOn(map);
    setTimeout(()=>map.closePopup(done),3500);
  };

  // Save ANY tapped point (not a documented occurrence) as a plain spot to evaluate.
  window.setSpot=function(lat,lon){
    if(!window.FieldGoldData){ alert('Shared data not available'); return; }
    FieldGoldData.put({ kind:'occurrence', lat:lat, lon:lon, source:'map-pick',
      name:'Picked spot', pending:true, plain:true });
    map.closePopup();
    const done=L.popup({maxWidth:240}).setLatLng([lat,lon])
      .setContent('<div class="info-pop"><span class="h" style="color:#3a7a2a;">✓ Spot sent to Field Brain</span>Open Field Brain → it will offer to start an evaluation here. No coordinates to type.</div>')
      .openOn(map);
    setTimeout(()=>map.closePopup(done),3500);
  };

  // Guard: a drag/scroll shouldn't fire the identify. Track movement between
  // press and release; only treat it as a real tap if the map didn't move and
  // no query is already in flight.
  let moved=false, querying=false;
  map.on('movestart',()=>{ moved=true; });
  map.on('mousedown',()=>{ moved=false; });
  map.on('dragstart',()=>{ moved=true; });

  map.on('click',async e=>{
    if(moved){ moved=false; return; }      // was a pan/scroll, not a tap
    if(querying){ return; }                // don't stack queries
    querying=true;
    setTimeout(()=>{ querying=false; }, 12000);  // safety: never stay stuck if a server hangs
    const sz=map.getSize(),pt=map.latLngToContainerPoint(e.latlng,map.getZoom()),b=map.getBounds();
    const pop=L.popup({maxWidth:260}).setLatLng(e.latlng).setContent('<div class="info-pop">checking this spot…</div>').openOn(map);
    let claimHtml='', ardfHtml='', claimDone=false, ardfDone=false;
    function render(){
      let h='';
      if(claimHtml) h+='<div class="info-pop"><span class="h">⚠ CLAIMED GROUND — don\'t dig</span>'+claimHtml+'</div>';
      if(ardfHtml)  h+='<div class="info-pop"><span class="h">Gold occurrence (ARDF)</span>'+ardfHtml
        +'<button onclick="saveOccurrence('+e.latlng.lat+','+e.latlng.lng+')" style="margin-top:8px;width:100%;padding:7px;border:none;border-radius:6px;background:#C9A227;color:#14110C;font-weight:700;font-size:.78rem;cursor:pointer;font-family:inherit;">＋ Send to Field Brain to evaluate</button></div>';
      if(claimDone&&ardfDone&&!h) h='<div class="info-pop">No claim or recorded occurrence at this point.</div>';
      else if(!h) h='<div class="info-pop">checking… (claims server can be slow)</div>';
      if(claimDone&&ardfDone) querying=false;
      // Universal "use this spot" — works on ANY tapped point, not just occurrences.
      // Only show once both checks are done, so it doesn't jump around while loading.
      if(claimDone&&ardfDone&&!ardfHtml){
        h+='<div class="info-pop" style="border-top:1px solid #3A3225;margin-top:6px;padding-top:8px;">'
          +'<span class="mono" style="font-size:.72rem;color:#9C9684;">'+e.latlng.lat.toFixed(5)+', '+e.latlng.lng.toFixed(5)+'</span>'
          +'<button onclick="setSpot('+e.latlng.lat+','+e.latlng.lng+')" style="margin-top:6px;width:100%;padding:7px;border:none;border-radius:6px;background:#C9A227;color:#14110C;font-weight:700;font-size:.78rem;cursor:pointer;font-family:inherit;">＋ Use this spot in Field Brain</button></div>';
      }
      pop.setContent(h);
    }
    // ARDF (fast) — show as soon as it returns
    (async()=>{
      try{
        const url='https://mrdata.usgs.gov/services/ardf?'+new URLSearchParams({service:'WMS',version:'1.3.0',
          request:'GetFeatureInfo',layers:'ardf',query_layers:'ardf',info_format:'text/html',crs:'EPSG:4326',
          width:sz.x,height:sz.y,bbox:`${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`,
          i:Math.round(pt.x),j:Math.round(pt.y)});
        const r=await fetchT(url,{},6000);const tx=(await r.text()).replace(/<\?xml[^>]*\?>/,'').trim();
        if(tx&&tx.length>25&&!/no features|unable to access/i.test(tx)) ardfHtml=tx;
      }catch(_){}
      ardfDone=true; render();
    })();
    // Claims (slow) — fills in when ready, times out gracefully
    (async()=>{
      try{
        const url='https://gis.blm.gov/akarcgis/rest/services/Minerals/BLM_AK_Federal_Mining_Claims/MapServer/identify?'
          +new URLSearchParams({geometry:`${e.latlng.lng},${e.latlng.lat}`,geometryType:'esriGeometryPoint',
          sr:'4326',layers:'all:0',tolerance:'5',mapExtent:`${b.getWest()},${b.getSouth()},${b.getEast()},${b.getNorth()}`,
          imageDisplay:`${sz.x},${sz.y},96`,returnGeometry:'false',f:'json'});
        const r=await fetchT(url,{},6000);const j=await r.json();
        if(j.results&&j.results.length){const a=j.results[0].attributes;
          claimHtml='Casefile: '+(a['Case Serial Number']||a.CSE_SERIAL_NBR||a.SERIAL||Object.values(a)[0]||'?');}
      }catch(_){}
      claimDone=true; render();
    })();
  });
  // ===== PROVEN + OPEN GROUND (Chris Ralph's old-timer-drainage-claim workflow, automated) =====
  // For gold occurrences (ARDF) currently in view, check each against BLM active claims.
  // Flag: has documented gold BUT not inside an active claim = candidate open ground.
  // HONEST: this is a research aid. Data has lag/gaps. ALWAYS verify with BLM before acting.
  const openMarkers = L.layerGroup().addTo(map);

  // PROVEN approach (validated in-browser): USGS ARDF WFS 1.1.0 returns GML with ms: tags.
  // bbox MUST be lon,lat order. We parse ms:site / ms:comm_main / ms:latitude / ms:longitude.
  // Cache the result so we only fetch once per session (data is static historic records).
  let __ardfCache=null;
  async function ardfPointsInView(){
    if(__ardfCache) return __ardfCache;
    const b=map.getBounds();
    // lon,lat,lon,lat  (the axis order that actually works for this MapServer WFS)
    const url='https://mrdata.usgs.gov/wfs/ardf?'+new URLSearchParams({
      service:'WFS',version:'1.1.0',request:'GetFeature',typeName:'ardf',maxFeatures:'500',
      bbox:`${b.getWest()},${b.getSouth()},${b.getEast()},${b.getNorth()}`});
    try{
      const r=await fetch(url); const xml=await r.text();
      const recs=[...xml.matchAll(/<ms:ardf[\s\S]*?<\/ms:ardf>/g)];
      const g=(s,re)=>{const x=s.match(re);return x?x[1]:'';};
      const feats=recs.map(m=>{
        const s=m[0];
        const lat=parseFloat(g(s,/<ms:latitude>([^<]*)</));
        const lon=parseFloat(g(s,/<ms:longitude>([^<]*)</));
        const name=g(s,/<ms:site>([^<]*)</)||'occurrence';
        const comm=g(s,/<ms:comm_main>([^<]*)</);
        return {name,comm,lat,lon};
      }).filter(o=>o.lat&&o.lon&&/Au/.test(o.comm));  // gold-bearing only
      // shape like the old code expected: {geometry:{coordinates:[lon,lat]}, properties:{...}}
      __ardfCache=feats.map(o=>({geometry:{coordinates:[o.lon,o.lat]},properties:{site_name:o.name,comm:o.comm}}));
      log('ARDF gold occurrences loaded: '+__ardfCache.length,'ok');
      return __ardfCache;
    }catch(e){ log('ARDF fetch failed: '+e.message,'err'); return []; }
  }

  async function isClaimed(lng,lat){
    const b=map.getBounds(),sz=map.getSize();
    const url='https://gis.blm.gov/akarcgis/rest/services/Minerals/BLM_AK_Federal_Mining_Claims/MapServer/identify?'
      +new URLSearchParams({geometry:`${lng},${lat}`,geometryType:'esriGeometryPoint',sr:'4326',
      layers:'all:0',tolerance:'3',mapExtent:`${b.getWest()},${b.getSouth()},${b.getEast()},${b.getNorth()}`,
      imageDisplay:`${sz.x},${sz.y},96`,returnGeometry:'false',f:'json'});
    try{const r=await Promise.race([fetch(url),new Promise((_,x)=>setTimeout(()=>x(),6000))]);
      const j=await r.json();return !!(j.results&&j.results.length);}
    catch(_){return null;} // null = unknown (server slow); treat as "can't confirm"
  }

  document.getElementById('findopen').addEventListener('click',async ()=>{
    const btn=document.getElementById('findopen');
    btn.textContent='⛏ scanning occurrences…'; btn.disabled=true; openMarkers.clearLayers();
    log('scanning ARDF occurrences in view…');
    const feats=await ardfPointsInView();
    log('found '+feats.length+' occurrences; checking claims…');
    let open=0,claimed=0,unknown=0;
    for(const f of feats){
      const c=f.geometry&&f.geometry.coordinates; if(!c) continue;
      const [lng,lat]=c;
      const name=(f.properties&&(f.properties.site_name||f.properties.name||f.properties.NAME))||'occurrence';
      const claimedNow=await isClaimed(lng,lat);
      if(claimedNow===false){
        open++;
        L.circleMarker([lat,lng],{radius:9,color:'#6FA760',weight:3,fillColor:'#6FA760',fillOpacity:.35})
          .addTo(openMarkers)
          .bindPopup('<div class="info-pop"><span class="h" style="color:#3a7a2a;">⛏ PROVEN + OPEN candidate</span>'
            +'<b>'+name+'</b>'+(f.properties.comm?' <span style="color:#8a5a1a;">('+f.properties.comm+')</span>':'')+'<br>Documented gold occurrence, no active claim detected here.<br>'
            +'<span style="color:#C25A3A;font-weight:700;">⚠ Verify with BLM MLRS before driving out or filing. Data lags reality.</span></div>');
      } else if(claimedNow===true){ claimed++; } else { unknown++; }
    }
    log('PROVEN+OPEN: '+open+' candidates · '+claimed+' claimed · '+unknown+' unverified','ok');
    btn.textContent='⛏ Find PROVEN + OPEN ground'; btn.disabled=false;
    if(open===0) log('(zoom to a district like Hatcher Pass, then scan)','');
  });

});
</script>
</body>
</html>
